<!DOCTYPE html>
<html lang="en">
    <link rel="stylesheet" href="control-structure.css">
    <script src="control-structure.js" defer></script>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>control-structure</title>

</head>
<body>
    <li>control control-structure allows you to
        <ul>make decision; if else</ul>
        <ul>repeat action; loop</ul>
        <ul>choose between many options; switch</ul>
    </li>
          
         
<div class="box"> 
    <h2>Multiplication Tables (1–5)</h2>
    <div id="table"></div>
</div>
            
             <div class="calc-container">
        <h2>Basic Calc</h2>
        
        <input type="number" id="num1" placeholder="First number">
        <input type="number" id="num2" placeholder="Second number">

        <div class="buttons">
            <button class="btn add" onclick="calculate('+')">+</button>
            <button class="btn sub" onclick="calculate('-')">-</button>
        </div>

        <div class="result-box">
            Result: <span id="result">0</span>
        </div>
    </div>
    
</body>
</html>
